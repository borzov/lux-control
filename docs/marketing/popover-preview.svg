<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">LuxControl menu bar popover</title>
  <desc id="desc">A clean macOS-style LuxControl popover with Boost and brightness controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#e8ebf0"/>
    </linearGradient>
    <radialGradient id="sun" cx="38%" cy="32%" r="70%">
      <stop offset="0" stop-color="#fff7ba"/>
      <stop offset="0.46" stop-color="#ffd60a"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="38" flood-color="#000" flood-opacity="0.20"/>
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="368" y="70" width="464" height="760" rx="38" fill="#f1f1f3"/>
    <rect x="369" y="71" width="462" height="758" rx="37" fill="none" stroke="#fff" stroke-width="2" opacity="0.85"/>

    <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
      <text x="410" y="128" fill="#111" font-size="34" font-weight="760">LuxControl</text>
      <text x="410" y="162" fill="#4f4f54" font-size="20" font-weight="520">Brighter displays</text>

      <rect x="626" y="106" width="164" height="50" rx="14" fill="#dedee1"/>
      <text x="646" y="138" fill="#111" font-size="18" font-weight="620">Built-in</text>
      <path d="M758 122 L768 132 L778 122" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

      <circle cx="600" cy="342" r="134" fill="url(#sun)"/>
      <circle cx="600" cy="342" r="134" fill="#fff" opacity="0.12"/>
      <text x="600" y="334" text-anchor="middle" fill="#241b0a" font-size="42" font-weight="700">☀︎</text>
      <text x="600" y="404" text-anchor="middle" fill="#241b0a" font-size="56" font-weight="780">2x</text>

      <text x="600" y="504" text-anchor="middle" fill="#111" font-size="28" font-weight="760">Boost active</text>
      <text x="600" y="540" text-anchor="middle" fill="#4f4f54" font-size="20" font-weight="520">Extended brightness enabled</text>

      <rect x="410" y="584" width="380" height="120" rx="24" fill="#e1e1e4"/>
      <text x="454" y="634" fill="#222" font-size="22" font-weight="720">Brightness</text>
      <text x="746" y="634" text-anchor="end" fill="#222" font-size="22" font-weight="720">100%</text>
      <text x="440" y="684" fill="#222" font-size="28">☀︎</text>
      <rect x="486" y="666" width="220" height="12" rx="6" fill="#ff8a00"/>
      <circle cx="706" cy="672" r="22" fill="#fff"/>
      <text x="742" y="684" fill="#222" font-size="28">☀︎</text>

      <text x="410" y="756" fill="#3b3b40" font-size="18" font-weight="580">Brightness and boost supported.</text>
      <text x="414" y="806" fill="#343438" font-size="30">↻</text>
      <text x="714" y="806" fill="#343438" font-size="30">⚙︎</text>
      <text x="766" y="806" fill="#343438" font-size="30">⏻</text>
    </g>
  </g>
</svg>
