name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Build and Test (${{ matrix.macos }})
    runs-on: ${{ matrix.macos }}
    strategy:
      fail-fast: false
      matrix:
        macos:
          - macos-26
          - macos-15
          - macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.2 on macOS 14
        if: matrix.macos == 'macos-14'
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show toolchain
        run: swift --version

      - name: Build debug app
        run: swift build --product LuxControlApp

      - name: Run tests
        run: swift test
