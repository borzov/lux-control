name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Release App
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Package app
        run: scripts/package-app.sh "${{ steps.version.outputs.version }}" "${{ github.run_number }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuxControl-${{ steps.version.outputs.version }}
          path: |
            dist/LuxControl-${{ steps.version.outputs.version }}.zip
            dist/LuxControl-${{ steps.version.outputs.version }}.zip.sha256

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LuxControl-${{ steps.version.outputs.version }}.zip
            dist/LuxControl-${{ steps.version.outputs.version }}.zip.sha256
          generate_release_notes: true

